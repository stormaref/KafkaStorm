name: Bug report
description: Report a bug in KafkaStorm
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or configuration to reproduce the issue.
      placeholder: |
        1. Configure AddKafkaStorm with ...
        2. Call Produce ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: KafkaStorm version
      placeholder: "10.0.0"
    validations:
      required: true
  - type: input
    id: dotnet
    attributes:
      label: .NET version
      placeholder: "10.0.x"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
